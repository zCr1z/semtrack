<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>
  <!-- Bar 1 (left, shortest) -->
  <rect x="14" y="55" width="16" height="30" rx="3" fill="url(#bar1)"/>
  <!-- Bar 2 (middle, tallest) -->
  <rect x="34" y="35" width="16" height="50" rx="3" fill="url(#bar2)"/>
  <!-- Bar 3 (right, medium) -->
  <rect x="54" y="44" width="16" height="41" rx="3" fill="url(#bar3)"/>
  <!-- Swoosh arrow -->
  <path d="M10 82 Q42 30 82 14" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Arrow head -->
  <path d="M72 10 L86 14 L80 27" stroke="url(#arrow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
